server:
  port: 8010

spring:
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${BOOK_REVIEW_DB_URL:jdbc:postgresql://postgres:15432/ript90}
    username: ${POSTGRES_USER:noorluca}
    password: ${POSTGRES_PASSWORD:superSecurePasswordHere}
  sql:
    init:
      mode: always
  mail:
    host: ${SMTP_HOST:}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:true}
          starttls:
            enable: ${SMTP_STARTTLS:true}

app:
  cors:
    # Optional: comma-separated list of allowed origins (default: localhost:4200, https://reviews.noorandluca.com)
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}
  reminder:
    enabled: ${REMINDER_ENABLED:false}
    recipient: ${REMINDER_RECIPIENT:}
    cron: ${REMINDER_CRON:0 0 9 * * ?}
  storage:
    base-dir: ./data
    upload-dir: ./data/uploads
  kindle:
    content-path: ${KINDLE_CONTENT_PATH:}
  ai:
    base-url: ${AI_BASE_URL:https://api.openai.com}
    api-key: ${OPENAI_API_KEY:}
    model: ${AI_MODEL:gpt-4o-mini}
    summary-max-chars: 20000
